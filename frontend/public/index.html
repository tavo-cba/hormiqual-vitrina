<!DOCTYPE html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#24242b" />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="Control de calidad del hormigón"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <!-- manifest.json se carga dinámicamente desde JS -->
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Hormiqual</title>
    <!-- El <link rel="manifest"> se crea dinámicamente abajo; no se carga estático
         para evitar que el browser tome un manifest sin iconos del tenant. -->
    <script>
      (function() {
        var host = window.location.hostname;
        var subdomain = host.split('.')[0];
        // En localhost / IP no hay tenant resoluble; mantenemos los assets estáticos.
        var isLocalDev = host === 'localhost' || /^\d+\./.test(host);

        function buildLink(rel, href, type) {
          var l = document.createElement('link');
          l.rel = rel;
          l.href = href;
          if (type) l.type = type;
          document.head.appendChild(l);
          return l;
        }

        if (isLocalDev) {
          buildLink('manifest', '/manifest.json');
          return;
        }

        // Defaults: si el tenant no está en tenant-config.json igual armamos
        // el manifest con el subdominio como slug del backend.
        var DEFAULT_BACKEND = 'https://api.hormiqual.com';

        fetch('/tenant-config.json')
          .then(function(r) { return r.ok ? r.json() : {}; })
          .catch(function() { return {}; })
          .then(function(data) {
            var cfg = (data && data[subdomain]) || {};
            var backendUrl = cfg.backendUrl || DEFAULT_BACKEND;
            var tenant = cfg.backendTenant || subdomain;
            var bg = '%23ffffff';
            var manifestUrl = backendUrl + '/api/public/manifest/' + tenant + '?bg=' + bg + '&prefer=thumbnail';
            var iconBase = backendUrl + '/api/public/icon/' + tenant;

            buildLink('manifest', manifestUrl);

            // Pisar favicon y apple-touch-icon estáticos
            var existingFav = document.querySelector('link[rel="icon"]');
            if (existingFav) existingFav.parentNode.removeChild(existingFav);
            buildLink('icon', iconBase + '?size=192&prefer=thumbnail', 'image/png');

            var existingApple = document.querySelector('link[rel="apple-touch-icon"]');
            if (existingApple) existingApple.parentNode.removeChild(existingApple);
            buildLink('apple-touch-icon', iconBase + '?size=192&bg=' + bg + '&prefer=thumbnail');
          })
          .catch(function() {
            buildLink('manifest', '/manifest.json');
          });
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
  <script src="https://kit.fontawesome.com/21b25314b7.js" crossorigin="anonymous"></script>
</html>
